spring.application.name=medmonstros

# --- H2 em modo ARQUIVO: persiste os dados entre execucoes (requisito g) ---
spring.datasource.url=jdbc:h2:file:./data/medmonstros;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ddl-auto=update: o Hibernate CRIA/ATUALIZA as tabelas e colunas a partir das
# classes @Entity no boot (voce NAO escreve CREATE TABLE manualmente).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console web do H2 em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
